<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHL Contact Capture</title>

  <!-- Office.js — must be loaded first -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>

  <!-- ── Loading state ───────────────────────────────────────────────────── -->
  <div id="loading">
    <div class="loading-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <p>Loading contact…</p>
  </div>

  <!-- ── No config warning ────────────────────────────────────────────────── -->
  <div id="no-config" class="hidden">
    <div class="warn-box">
      <div class="warn-icon">⚙️</div>
      <h3>Setup Required</h3>
      <p>Enter your GHL API Key and Location ID below to get started.</p>
    </div>
  </div>

  <!-- ── Main panel ───────────────────────────────────────────────────────── -->
  <div id="main" class="hidden">

    <!-- Contact card -->
    <div class="contact-card">
      <div class="avatar" id="avatar">?</div>
      <div class="contact-info">
        <div class="contact-name"  id="c-name">–</div>
        <div class="contact-email" id="c-email">–</div>
      </div>
    </div>

    <!-- Status -->
    <div id="status" class="status hidden"></div>

    <!-- Form -->
    <div class="form">

      <div class="row-2">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="f-fname" placeholder="First" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="f-lname" placeholder="Last" />
        </div>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="email@example.com" />
      </div>

      <div class="field">
        <label>Phone <span class="opt">(optional)</span></label>
        <input type="tel" id="f-phone" placeholder="+1 (555) 000-0000" />
      </div>

      <div class="field">
        <label>Company <span class="opt">(optional)</span></label>
        <input type="text" id="f-company" placeholder="Company name" />
      </div>

      <div class="field">
        <label>Tags <span class="opt">(comma-separated)</span></label>
        <input type="text" id="f-tags" placeholder="lead, outlook, warm" />
      </div>

      <div class="field">
        <label>Note <span class="opt">(optional)</span></label>
        <textarea id="f-note" placeholder="Add a note about this contact…" rows="3"></textarea>
      </div>

    </div>

    <!-- Submit -->
    <div class="actions">
      <button id="btn-add" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="19" y1="8" x2="23" y2="8"/><line x1="21" y1="6" x2="21" y2="10"/>
        </svg>
        <span id="btn-label">Add to GHL</span>
        <svg id="spinner" class="spin hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      </button>
    </div>

  </div><!-- /#main -->

  <!-- ── Settings panel ───────────────────────────────────────────────────── -->
  <div id="settings-panel">

    <div class="settings-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </div>

    <div class="field">
      <label>GHL API Key</label>
      <div class="input-wrap">
        <input type="password" id="s-apikey" placeholder="Your API key or Bearer token" autocomplete="off" />
        <button class="toggle-pw" id="toggle-pw" title="Show/hide">
          <svg id="eye-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Location ID</label>
      <input type="text" id="s-locid" placeholder="Your GHL Location ID" autocomplete="off" />
    </div>

    <button id="btn-save" class="btn-save">Save Settings</button>
    <div id="save-status" class="save-status hidden">✓ Saved</div>

    <div class="settings-hint">
      Find these in <strong>GHL → Settings → Integrations → API Keys</strong>
    </div>

  </div><!-- /#settings-panel -->

  <script src="taskpane.js"></script>
</body>
</html>
